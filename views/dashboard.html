<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - PLASTI'TRACK</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .stats-cards { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin: 30px 0; }
        .stat-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(8px); border-radius: 20px; padding: 20px; min-width: 160px; text-align: center; border: 1px solid rgba(255,193,7,0.3); transition: 0.3s; }
        .stat-card i { font-size: 2rem; color: #FFC107; }
        .stat-card .number { font-size: 2rem; font-weight: 800; }
        canvas { max-width: 600px; margin: 30px auto; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 15px; }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    <div class="particles" id="particles"></div>

    <header class="main-header">
        <div class="header-container">
            <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
            <a href="/" class="logo-title"><i class="fas fa-recycle"></i> PLASTI'TRACK</a>
            <div class="auth-buttons">
                <a href="/login" class="auth-btn"><i class="fas fa-sign-in-alt"></i> Connexion</a>
                <a href="/register" class="auth-btn register-btn"><i class="fas fa-user-plus"></i> Inscription</a>
            </div>
        </div>
    </header>

    <div class="side-menu" id="sideMenu">
        <div class="menu-items">
            <a href="/" class="menu-item"><i class="fas fa-home"></i> Accueil</a>
            <a href="/objectifs" class="menu-item"><i class="fas fa-bullseye"></i> Objectifs</a>
            <a href="/fonctionnalites" class="menu-item"><i class="fas fa-cogs"></i> Fonctionnalités</a>
            <a href="/impact" class="menu-item"><i class="fas fa-chart-line"></i> Impact</a>
            <a href="/carte" class="menu-item"><i class="fas fa-map-marked-alt"></i> Carte</a>
            <a href="/dashboard" class="menu-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="/galerie" class="menu-item"><i class="fas fa-images"></i> Galerie</a>
            <a href="/contact" class="menu-item"><i class="fas fa-envelope"></i> Contact</a>
        </div>
    </div>
    <div class="menu-overlay" id="menuOverlay"></div>

    <main class="main-content">
        <h1 class="page-title">Tableau de bord opérateur</h1>
        <div id="stats" class="stats-cards">Chargement...</div>
        <canvas id="kgChart" width="400" height="200"></canvas>
    </main>

    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 60; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                const size = Math.random() * 6 + 2;
                p.style.width = `${size}px`;
                p.style.height = `${size}px`;
                p.style.left = `${Math.random() * 100}%`;
                p.style.animationDuration = `${Math.random() * 10 + 8}s`;
                p.style.animationDelay = `${Math.random() * 5}s`;
                p.style.background = `rgba(255, 193, 7, ${Math.random() * 0.5})`;
                container.appendChild(p);
            }
        }
        createParticles();

        const hamburger = document.getElementById('hamburgerBtn');
        const sideMenu = document.getElementById('sideMenu');
        const overlay = document.getElementById('menuOverlay');
        function closeMenu() { sideMenu.classList.remove('open'); overlay.classList.remove('active'); }
        function openMenu() { sideMenu.classList.add('open'); overlay.classList.add('active'); }
        hamburger.addEventListener('click', () => { if (sideMenu.classList.contains('open')) closeMenu(); else openMenu(); });
        overlay.addEventListener('click', closeMenu);

        fetch('/api/stats')
            .then(res => res.json())
            .then(data => {
                document.getElementById('stats').innerHTML = `
                    <div class="stat-card"><i class="fas fa-box"></i><div class="number">${data.depots.total_depots || 0}</div><p>Dépôts</p></div>
                    <div class="stat-card"><i class="fas fa-weight-hanging"></i><div class="number">${data.depots.total_kg || 0} kg</div><p>Collectés</p></div>
                    <div class="stat-card"><i class="fas fa-star"></i><div class="number">${data.depots.total_points || 0}</div><p>Points distribués</p></div>
                    <div class="stat-card"><i class="fas fa-map-marker-alt"></i><div class="number">${data.points_collecte || 0}</div><p>Points de collecte</p></div>
                `;
            });

        const ctx = document.getElementById('kgChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: { labels: ['Semaine 1', 'Semaine 2', 'Semaine 3', 'Semaine 4'], datasets: [{ label: 'Kg collectés', data: [120, 250, 380, 420], backgroundColor: '#FFC107', borderRadius: 10 }] },
            options: { responsive: true, plugins: { legend: { labels: { color: 'white' } } } }
        });
    </script>
</body>
</html>
