<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Carte interactive - PLASTI'TRACK</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div class="animated-bg"></div>
    <div class="particles" id="particles"></div>

    <header class="main-header">
        <div class="header-container">
            <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
            <a href="/" class="logo-title"><i class="fas fa-recycle"></i><span> PLASTI'TRACK</span></a>
            <div class="auth-buttons">
                <a href="/login" class="auth-btn"><i class="fas fa-sign-in-alt"></i> Connexion</a>
                <a href="/register" class="auth-btn register-btn"><i class="fas fa-user-plus"></i> Inscription</a>
            </div>
        </div>
    </header>

    <div class="side-menu" id="sideMenu">
        <div class="menu-items">
            <a href="/" class="menu-item"><i class="fas fa-home"></i> Accueil</a>
            <a href="/objectifs" class="menu-item"><i class="fas fa-bullseye"></i> Objectifs</a>
            <a href="/fonctionnalites" class="menu-item"><i class="fas fa-cogs"></i> Fonctionnalités</a>
            <a href="/impact" class="menu-item"><i class="fas fa-chart-line"></i> Impact</a>
            <a href="/carte" class="menu-item"><i class="fas fa-map-marked-alt"></i> Carte</a>
            <a href="/dashboard" class="menu-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="/galerie" class="menu-item"><i class="fas fa-images"></i> Galerie</a>
            <a href="/contact" class="menu-item"><i class="fas fa-envelope"></i> Contact</a>
        </div>
    </div>
    <div class="menu-overlay" id="menuOverlay"></div>

    <main class="main-content">
        <h1 class="page-title">Points de collecte</h1>
        <div id="map"></div>
        <button id="maPosition" class="btn-localize"><i class="fas fa-location-dot"></i> Me localiser</button>
        <p><i class="fas fa-info-circle"></i> Cliquez sur un marqueur pour signaler un dépôt (vous devez être connecté).</p>
    </main>

    <footer>
        <p>© 2025 PLASTI'TRACK - Incubé par CIPMEN - Lauréat UNICEF</p>
    </footer>

    <script>
        // Menu hamburger
        const hamburger = document.getElementById('hamburgerBtn');
        const sideMenu = document.getElementById('sideMenu');
        const overlay = document.getElementById('menuOverlay');
        function closeMenu() { sideMenu.classList.remove('open'); overlay.classList.remove('active'); }
        function openMenu() { sideMenu.classList.add('open'); overlay.classList.add('active'); }
        hamburger.addEventListener('click', () => { if (sideMenu.classList.contains('open')) closeMenu(); else openMenu(); });
        overlay.addEventListener('click', closeMenu);
        document.querySelectorAll('.menu-item').forEach(link => link.addEventListener('click', closeMenu));

        // Vérifier l'état de connexion
        let isLoggedIn = false;
        let currentUser = null;

        fetch('/api/me', { credentials: 'include' })
            .then(res => {
                if (res.status === 200) {
                    isLoggedIn = true;
                    return res.json();
                } else {
                    throw new Error('Non connecté');
                }
            })
            .then(user => {
                currentUser = user;
                console.log('Connecté :', user.nom);
            })
            .catch(() => {
                isLoggedIn = false;
                console.log('Non connecté');
            })
            .finally(() => {
                initialiserCarte();
            });

        function initialiserCarte() {
            const map = L.map('map').setView([13.5121, 2.1126], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
            }).addTo(map);

            fetch('/api/points')
                .then(res => res.json())
                .then(points => {
                    points.forEach(p => {
                        let popupHtml = `<b>${p.nom}</b><br>${p.adresse || ''}<br>`;
                        if (isLoggedIn) {
                            popupHtml += `<button class="depot-btn" data-id="${p.id}" style="background:#FFC107; color:#0a1f18; border:none; padding:5px 12px; border-radius:20px; margin-top:5px; cursor:pointer;">🗑️ Déposer ici</button>`;
                        } else {
                            popupHtml += `<a href="/login" style="background:#FFC107; color:#0a1f18; padding:5px 12px; border-radius:20px; text-decoration:none; display:inline-block; margin-top:5px;">🔒 Connectez-vous</a>`;
                        }
                        const marker = L.marker([p.latitude, p.longitude]).addTo(map);
                        marker.bindPopup(popupHtml);
                        // On doit attacher l'événement après ouverture de la popup
                        marker.on('popupopen', () => {
                            const btn = document.querySelector(`.depot-btn[data-id="${p.id}"]`);
                            if (btn) {
                                btn.onclick = () => signalerDepot(p.id);
                            }
                        });
                    });
                })
                .catch(err => console.error('Erreur chargement points', err));

            // Géolocalisation
            document.getElementById('maPosition').addEventListener('click', () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        pos => {
                            map.setView([pos.coords.latitude, pos.coords.longitude], 15);
                            L.marker([pos.coords.latitude, pos.coords.longitude]).addTo(map).bindPopup("Vous êtes ici").openPopup();
                        },
                        () => alert("Géolocalisation refusée")
                    );
                } else {
                    alert("Votre navigateur ne supporte pas la géolocalisation.");
                }
            });
        }

        // Fonction de dépôt
        window.signalerDepot = async function(pointId) {
            if (!isLoggedIn) {
                alert("Veuillez vous connecter pour effectuer un dépôt.");
                window.location.href = '/login';
                return;
            }
            const poids = prompt("Entrez le poids en kg :");
            if (!poids || isNaN(poids) || parseFloat(poids) <= 0) {
                alert("Poids invalide. Entrez un nombre positif.");
                return;
            }
            try {
                const response = await fetch('/api/depot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ point_id: pointId, poids_kg: parseFloat(poids) })
                });
                const data = await response.json();
                if (response.status === 401) {
                    alert("Session expirée. Veuillez vous reconnecter.");
                    window.location.href = '/login';
                    return;
                }
                if (data.success) {
                    alert(`✅ Dépôt enregistré ! +${data.points_gagnes} points.`);
                    // Recharger la page ou mettre à jour l'affichage des points
                } else {
                    alert("Erreur : " + (data.error || "Inconnue"));
                }
            } catch (err) {
                console.error(err);
                alert("Erreur réseau. Vérifiez votre connexion.");
            }
        };

        // Particules
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 60; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                const size = Math.random() * 6 + 2;
                p.style.width = `${size}px`;
                p.style.height = `${size}px`;
                p.style.left = `${Math.random() * 100}%`;
                p.style.animationDuration = `${Math.random() * 10 + 8}s`;
                p.style.animationDelay = `${Math.random() * 5}s`;
                p.style.background = `rgba(255, 193, 7, ${Math.random() * 0.5})`;
                container.appendChild(p);
            }
        }
        createParticles();
    </script>
</body>
</html>
