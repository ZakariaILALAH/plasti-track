<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Carte interactive - PLASTI'TRACK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* Styles globaux (similaires aux précédents) */
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a1f18; color: #e0f2e9; overflow-x: hidden; }
        .animated-bg { position: fixed; top:0; left:0; width:100%; height:100%; z-index:-2; background: linear-gradient(135deg,#0a2e1f,#0c3b2a,#1a5a3e); background-size:300% 300%; animation: gradientShift 12s infinite; }
        @keyframes gradientShift { 0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;} }
        .particles { position: fixed; top:0; left:0; width:100%; height:100%; z-index:-1; pointer-events:none; }
        .particle { position: absolute; background: rgba(255,193,7,0.3); border-radius: 50%; animation: floatParticle 15s infinite linear; }
        @keyframes floatParticle { 0%{transform:translateY(100vh) rotate(0); opacity:0;} 10%{opacity:0.8;} 90%{opacity:0.8;} 100%{transform:translateY(-20vh) rotate(360deg); opacity:0;} }
        .main-header { position: fixed; top:0; left:0; width:100%; z-index:1000; background:rgba(10,31,24,0.85); backdrop-filter:blur(12px); border-bottom:1px solid rgba(255,193,7,0.3); padding:12px 20px; }
        .header-container { display:flex; justify-content:space-between; align-items:center; max-width:1400px; margin:0 auto; }
        .hamburger { font-size:1.8rem; background:none; border:none; color:#FFC107; cursor:pointer; width:40px; }
        .logo-title { font-size:1.4rem; font-weight:bold; color:white; text-decoration:none; }
        .logo-title i { color:#FFC107; }
        .auth-buttons { display:flex; gap:12px; }
        .auth-btn { padding:6px 18px; border-radius:40px; text-decoration:none; font-weight:600; background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.3); }
        .auth-btn:hover { background:#FFC107; color:#0a1f18; }
        .register-btn { background:#FFC107; color:#0a1f18; }
        .side-menu { position:fixed; top:0; left:-300px; width:280px; height:100%; background:rgba(10,31,24,0.95); backdrop-filter:blur(15px); border-right:1px solid rgba(255,193,7,0.3); z-index:1100; transition:left 0.3s; padding:80px 20px 30px; }
        .side-menu.open { left:0; }
        .menu-items { display:flex; flex-direction:column; gap:15px; }
        .menu-item { display:flex; align-items:center; gap:15px; padding:12px 20px; border-radius:50px; color:#e0f2e9; text-decoration:none; background:rgba(255,255,255,0.05); border:1px solid rgba(255,193,7,0.2); }
        .menu-item:hover { background:rgba(255,193,7,0.2); transform:translateX(8px); }
        .menu-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1050; display:none; }
        .menu-overlay.active { display:block; }
        .main-content { padding-top:80px; max-width:1200px; margin:0 auto; padding-left:20px; padding-right:20px; }
        .page-title { font-size:2rem; text-align:center; margin-bottom:20px; background:linear-gradient(135deg,#FFC107,#00A859); -webkit-background-clip:text; background-clip:text; color:transparent; }
        #map { height: 60vh; min-height: 400px; border-radius: 20px; margin: 20px 0; border: 2px solid rgba(255,193,7,0.3); }
        .btn-localize { background: #FFC107; color: #0a1f18; padding: 10px 25px; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        footer { margin-top:80px; text-align:center; padding:20px; border-top:1px solid rgba(255,193,7,0.2); }
        @media (max-width:768px) { .main-content { padding-left:15px; padding-right:15px; } .page-title { font-size:1.5rem; } #map { height: 50vh; min-height: 300px; } }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    <div class="particles" id="particles"></div>

    <header class="main-header">
        <div class="header-container">
            <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
            <a href="/" class="logo-title"><i class="fas fa-recycle"></i><span> PLASTI'TRACK</span></a>
            <div class="auth-buttons">
                <a href="/login" class="auth-btn"><i class="fas fa-sign-in-alt"></i> Connexion</a>
                <a href="/register" class="auth-btn register-btn"><i class="fas fa-user-plus"></i> Inscription</a>
            </div>
        </div>
    </header>

    <div class="side-menu" id="sideMenu">
        <div class="menu-items">
            <a href="/" class="menu-item"><i class="fas fa-home"></i> Accueil</a>
            <a href="/objectifs" class="menu-item"><i class="fas fa-bullseye"></i> Objectifs</a>
            <a href="/fonctionnalites" class="menu-item"><i class="fas fa-cogs"></i> Fonctionnalités</a>
            <a href="/impact" class="menu-item"><i class="fas fa-chart-line"></i> Impact</a>
            <a href="/carte" class="menu-item"><i class="fas fa-map-marked-alt"></i> Carte</a>
            <a href="/dashboard" class="menu-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="/galerie" class="menu-item"><i class="fas fa-images"></i> Galerie</a>
            <a href="/contact" class="menu-item"><i class="fas fa-envelope"></i> Contact</a>
        </div>
    </div>
    <div class="menu-overlay" id="menuOverlay"></div>

    <main class="main-content">
        <h1 class="page-title">Points de collecte à Dosso</h1>
        <div id="map"></div>
        <button id="maPosition" class="btn-localize"><i class="fas fa-location-dot"></i> Me localiser</button>
        <p><i class="fas fa-info-circle"></i> Cliquez sur un marqueur pour signaler un dépôt (connectez-vous d'abord).</p>
    </main>

    <footer>
        <p>© 2025 PLASTI'TRACK - Incubé par CIPMEN - Lauréat UNICEF</p>
    </footer>

    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 60; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                const size = Math.random() * 6 + 2;
                p.style.width = `${size}px`;
                p.style.height = `${size}px`;
                p.style.left = `${Math.random() * 100}%`;
                p.style.animationDuration = `${Math.random() * 10 + 8}s`;
                p.style.animationDelay = `${Math.random() * 5}s`;
                p.style.background = `rgba(255, 193, 7, ${Math.random() * 0.5})`;
                container.appendChild(p);
            }
        }
        createParticles();

        const hamburger = document.getElementById('hamburgerBtn');
        const sideMenu = document.getElementById('sideMenu');
        const overlay = document.getElementById('menuOverlay');
        function closeMenu() { sideMenu.classList.remove('open'); overlay.classList.remove('active'); }
        function openMenu() { sideMenu.classList.add('open'); overlay.classList.add('active'); }
        hamburger.onclick = () => sideMenu.classList.contains('open') ? closeMenu() : openMenu();
        overlay.onclick = closeMenu;
        document.querySelectorAll('.menu-item').forEach(link => link.addEventListener('click', closeMenu));

        let isLoggedIn = false;
        fetch('/api/me', { credentials: 'include' }).then(r => { if(r.ok) isLoggedIn = true; }).catch(()=>{}).finally(initMap);

        function initMap() {
            const map = L.map('map').setView([13.0446, 3.1945], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© OpenStreetMap' }).addTo(map);

            fetch('/api/points', { credentials: 'include' })
                .then(res => res.json())
                .then(points => {
                    points.forEach(p => {
                        const btn = isLoggedIn
                            ? `<button onclick="deposer(${p.id})" style="background:#FFC107; border:none; padding:5px 12px; border-radius:20px; cursor:pointer;">🗑️ Déposer</button>`
                            : `<a href="/login" style="background:#FFC107; color:#0a1f18; padding:5px 12px; border-radius:20px; text-decoration:none;">🔒 Connectez-vous</a>`;
                        L.marker([p.latitude, p.longitude]).addTo(map)
                            .bindPopup(`<b>${p.nom}</b><br>${p.adresse||''}<br>${btn}`);
                    });
                })
                .catch(err => console.error(err));

            document.getElementById('maPosition').onclick = () => {
                navigator.geolocation.getCurrentPosition(pos => map.setView([pos.coords.latitude, pos.coords.longitude], 15));
            };
        }

        window.deposer = async function(pointId) {
            if (!isLoggedIn) { alert("Connectez-vous d'abord"); window.location.href='/login'; return; }
            let poids = prompt("Poids (kg) :");
            if (!poids || isNaN(poids)) return;
            try {
                const res = await fetch('/api/depot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ point_id: pointId, poids_kg: parseFloat(poids) })
                });
                const data = await res.json();
                if (data.success) alert(`✅ Dépôt enregistré ! +${data.points_gagnes} points.`);
                else alert("Erreur : " + (data.error || "Inconnue"));
            } catch(e) { alert("Erreur réseau"); }
        };
    </script>
</body>
</html>
