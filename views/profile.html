<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mon profil - PLASTI'TRACK</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .profile-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
        }
        .profile-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            width: 350px;
            border: 1px solid rgba(255,193,7,0.3);
        }
        .profile-card h3 {
            color: #FFC107;
            margin-bottom: 20px;
            border-left: 4px solid #FFC107;
            padding-left: 15px;
        }
        .profile-info p {
            margin: 12px 0;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }
        .points-badge {
            background: #FFC107;
            color: #0a1f18;
            padding: 5px 15px;
            border-radius: 40px;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
        }
        .depots-list {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            flex: 1;
            min-width: 300px;
            border: 1px solid rgba(255,193,7,0.3);
        }
        .depot-item {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .logout-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    <div class="particles" id="particles"></div>

    <header class="main-header">
        <div class="header-container">
            <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
            <a href="/" class="logo-title"><i class="fas fa-recycle"></i><span> PLASTI'TRACK</span></a>
            <div class="auth-buttons">
                <a href="/login" class="auth-btn"><i class="fas fa-sign-in-alt"></i> Connexion</a>
                <a href="/register" class="auth-btn register-btn"><i class="fas fa-user-plus"></i> Inscription</a>
            </div>
        </div>
    </header>

    <div class="side-menu" id="sideMenu">
        <div class="menu-items">
            <a href="/" class="menu-item"><i class="fas fa-home"></i> Accueil</a>
            <a href="/objectifs" class="menu-item"><i class="fas fa-bullseye"></i> Objectifs</a>
            <a href="/fonctionnalites" class="menu-item"><i class="fas fa-cogs"></i> Fonctionnalités</a>
            <a href="/impact" class="menu-item"><i class="fas fa-chart-line"></i> Impact</a>
            <a href="/carte" class="menu-item"><i class="fas fa-map-marked-alt"></i> Carte</a>
            <a href="/dashboard" class="menu-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="/galerie" class="menu-item"><i class="fas fa-images"></i> Galerie</a>
            <a href="/contact" class="menu-item"><i class="fas fa-envelope"></i> Contact</a>
        </div>
    </div>
    <div class="menu-overlay" id="menuOverlay"></div>

    <main class="main-content">
        <h1 class="page-title">Mon profil</h1>
        <div id="profileContent" style="text-align:center; padding:50px;"><i class="fas fa-spinner fa-pulse fa-2x"></i> Chargement...</div>
    </main>

    <footer>
        <p>© 2025 PLASTI'TRACK - Incubé par CIPMEN - Lauréat UNICEF</p>
    </footer>

    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 60; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                const size = Math.random() * 6 + 2;
                p.style.width = `${size}px`;
                p.style.height = `${size}px`;
                p.style.left = `${Math.random() * 100}%`;
                p.style.animationDuration = `${Math.random() * 10 + 8}s`;
                p.style.animationDelay = `${Math.random() * 5}s`;
                p.style.background = `rgba(255, 193, 7, ${Math.random() * 0.5})`;
                container.appendChild(p);
            }
        }
        createParticles();

        const hamburger = document.getElementById('hamburgerBtn');
        const sideMenu = document.getElementById('sideMenu');
        const overlay = document.getElementById('menuOverlay');
        function closeMenu() { sideMenu.classList.remove('open'); overlay.classList.remove('active'); }
        function openMenu() { sideMenu.classList.add('open'); overlay.classList.add('active'); }
        hamburger.addEventListener('click', () => { if (sideMenu.classList.contains('open')) closeMenu(); else openMenu(); });
        overlay.addEventListener('click', closeMenu);
        document.querySelectorAll('.menu-item').forEach(link => link.addEventListener('click', closeMenu));

        async function loadProfile() {
            try {
                const res = await fetch('/api/me');
                if (res.status === 401) {
                    window.location.href = '/login';
                    return;
                }
                const user = await res.json();
                const depotsRes = await fetch('/api/me/depots');
                const depots = await depotsRes.json();

                const depotsHtml = depots.map(d => `
                    <div class="depot-item">
                        <strong>${d.point_nom}</strong><br>
                        ${d.adresse ? d.adresse + '<br>' : ''}
                        ${d.poids_kg} kg - <span class="points-badge" style="background:#FFC107; color:#0a1f18; padding:2px 10px; font-size:0.8rem;">+${d.points_credites} pts</span><br>
                        <small>${new Date(d.date_depot).toLocaleDateString('fr-FR')}</small>
                    </div>
                `).join('') || '<p>Aucun dépôt effectué.</p>';

                const html = `
                    <div class="profile-container">
                        <div style="text-align:center; margin:20px 0;">
                        <span class="points-badge"><i class="fas fa-star"></i> ${user.points} points</span>
                        <br><br>
                        <a href="/carte" class="btn-localize" style="display:inline-block; text-decoration:none; background:#FFC107; color:#0a1f18; padding:8px 20px; border-radius:40px; font-weight:bold;">
                        <i class="fas fa-map-marked-alt"></i> Aller à la carte
                        </a>
                     </div>
                            <div style="text-align:center; margin:20px 0;">
                                <span class="points-badge"><i class="fas fa-star"></i> ${user.points} points</span>
                            </div>
                            <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Se déconnecter</button>
                        </div>
                        <div class="depots-list">
                            <h3><i class="fas fa-history"></i> Historique des dépôts</h3>
                            ${depotsHtml}
                        </div>
                    </div>
                `;
                document.getElementById('profileContent').innerHTML = html;
                document.getElementById('logoutBtn').addEventListener('click', async () => {
                    await fetch('/api/logout');
                    window.location.href = '/';
                });
            } catch (err) {
                document.getElementById('profileContent').innerHTML = '<p style="color:red;">Erreur de chargement. Veuillez vous reconnecter.</p>';
            }
        }
        loadProfile();
    </script>
</body>
</html>
