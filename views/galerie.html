<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Galerie - PLASTI'TRACK</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .upload-area { background: rgba(255,255,255,0.08); backdrop-filter: blur(8px); border-radius: 25px; padding: 25px; margin-bottom: 40px; text-align: center; border: 1px dashed rgba(255,193,7,0.5); }
        .upload-area input, .upload-area textarea { margin: 10px 0; padding: 10px; width: 80%; border-radius: 30px; border: none; background: rgba(255,255,255,0.2); color: white; }
        .upload-area button { background: #FFC107; color: #0a1f18; padding: 10px 25px; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; }
        .gallery-grid { display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; }
        .gallery-item { background: rgba(255,255,255,0.08); backdrop-filter: blur(8px); border-radius: 20px; overflow: hidden; width: 260px; text-align: center; padding: 15px; transition: 0.3s; border: 1px solid rgba(255,193,7,0.3); }
        .gallery-item:hover { transform: translateY(-5px); border-color: #FFC107; }
        .gallery-item img { width: 100%; height: 180px; object-fit: cover; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    <div class="particles" id="particles"></div>

    <header class="main-header">
        <div class="header-container">
            <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
            <a href="/" class="logo-title"><i class="fas fa-recycle"></i> PLASTI'TRACK</a>
            <div class="auth-buttons">
                <a href="/login" class="auth-btn"><i class="fas fa-sign-in-alt"></i> Connexion</a>
                <a href="/register" class="auth-btn register-btn"><i class="fas fa-user-plus"></i> Inscription</a>
            </div>
        </div>
    </header>

    <div class="side-menu" id="sideMenu">
        <div class="menu-items">
            <a href="/" class="menu-item"><i class="fas fa-home"></i> Accueil</a>
            <a href="/objectifs" class="menu-item"><i class="fas fa-bullseye"></i> Objectifs</a>
            <a href="/fonctionnalites" class="menu-item"><i class="fas fa-cogs"></i> Fonctionnalités</a>
            <a href="/impact" class="menu-item"><i class="fas fa-chart-line"></i> Impact</a>
            <a href="/carte" class="menu-item"><i class="fas fa-map-marked-alt"></i> Carte</a>
            <a href="/dashboard" class="menu-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="/galerie" class="menu-item"><i class="fas fa-images"></i> Galerie</a>
            <a href="/contact" class="menu-item"><i class="fas fa-envelope"></i> Contact</a>
        </div>
    </div>
    <div class="menu-overlay" id="menuOverlay"></div>

    <main class="main-content">
        <h1 class="page-title">Nos actions en images</h1>
        <div class="upload-area">
            <input type="file" id="imageUpload" accept="image/*">
            <textarea id="desc" placeholder="Description..." rows="2"></textarea>
            <button id="uploadBtn"><i class="fas fa-cloud-upload-alt"></i> Partager</button>
        </div>
        <div id="gallery" class="gallery-grid"></div>
    </main>

    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 60; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                const size = Math.random() * 6 + 2;
                p.style.width = `${size}px`;
                p.style.height = `${size}px`;
                p.style.left = `${Math.random() * 100}%`;
                p.style.animationDuration = `${Math.random() * 10 + 8}s`;
                p.style.animationDelay = `${Math.random() * 5}s`;
                p.style.background = `rgba(255, 193, 7, ${Math.random() * 0.5})`;
                container.appendChild(p);
            }
        }
        createParticles();

        const hamburger = document.getElementById('hamburgerBtn');
        const sideMenu = document.getElementById('sideMenu');
        const overlay = document.getElementById('menuOverlay');
        function closeMenu() { sideMenu.classList.remove('open'); overlay.classList.remove('active'); }
        function openMenu() { sideMenu.classList.add('open'); overlay.classList.add('active'); }
        hamburger.addEventListener('click', () => { if (sideMenu.classList.contains('open')) closeMenu(); else openMenu(); });
        overlay.addEventListener('click', closeMenu);

        async function loadGallery() {
            const res = await fetch('/api/galerie-images');
            const images = await res.json();
            const galleryDiv = document.getElementById('gallery');
            galleryDiv.innerHTML = images.map(img => `
                <div class="gallery-item">
                    <img src="${img.image_path}" alt="photo">
                    <p>${img.description || ''}</p>
                    <small>${img.user_nom}</small>
                </div>
            `).join('');
        }
        document.getElementById('uploadBtn').onclick = async () => {
            const file = document.getElementById('imageUpload').files[0];
            if (!file) return alert("Choisissez une image");
            const description = document.getElementById('desc').value;
            const formData = new FormData();
            formData.append('image', file);
            formData.append('userId', 1);
            formData.append('description', description);
            await fetch('/api/upload-galerie', { method: 'POST', body: formData });
            loadGallery();
            document.getElementById('desc').value = '';
        };
        loadGallery();
    </script>
</body>
</html>
