<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - PLASTI'TRACK</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="animated-bg"></div>
    <div class="particles" id="particles"></div>

    <header class="main-header">
        <div class="header-container">
            <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
            <a href="/" class="logo-title"><i class="fas fa-recycle"></i><span> PLASTI'TRACK</span></a>
            <div class="auth-buttons">
                <a href="/login" class="auth-btn"><i class="fas fa-sign-in-alt"></i> Connexion</a>
                <a href="/register" class="auth-btn register-btn"><i class="fas fa-user-plus"></i> Inscription</a>
            </div>
        </div>
    </header>

    <div class="side-menu" id="sideMenu"><div class="menu-items"><!-- menu ici --></div></div>
    <div class="menu-overlay" id="menuOverlay"></div>

    <main class="main-content">
        <div class="login-container">
            <h2><i class="fas fa-sign-in-alt"></i> Connexion</h2>
            <form id="loginForm">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Mot de passe" required>
                <button type="submit">Se connecter</button>
            </form>
            <p>Pas encore inscrit ? <a href="/register" style="color:#FFC107;">Créer un compte</a></p>
            <div id="message" class="error-message"></div>
        </div>
    </main>

    <footer><p>© 2025 PLASTI'TRACK - Incubé par CIPMEN - Lauréat UNICEF</p></footer>

    <script>
        (function() {
            // Menu hamburger
            const hamburger = document.getElementById('hamburgerBtn');
            const sideMenu = document.getElementById('sideMenu');
            const overlay = document.getElementById('menuOverlay');
            if(hamburger) {
                hamburger.onclick = () => sideMenu.classList.contains('open') ? (sideMenu.classList.remove('open'), overlay.classList.remove('active')) : (sideMenu.classList.add('open'), overlay.classList.add('active'));
                overlay.onclick = () => { sideMenu.classList.remove('open'); overlay.classList.remove('active'); };
            }

            // Particules
            function createParticles() {
                const container = document.getElementById('particles');
                if(!container) return;
                for (let i = 0; i < 60; i++) {
                    const p = document.createElement('div');
                    p.classList.add('particle');
                    const size = Math.random() * 6 + 2;
                    p.style.width = `${size}px`;
                    p.style.height = `${size}px`;
                    p.style.left = `${Math.random() * 100}%`;
                    p.style.animationDuration = `${Math.random() * 10 + 8}s`;
                    p.style.animationDelay = `${Math.random() * 5}s`;
                    p.style.background = `rgba(255, 193, 7, ${Math.random() * 0.5})`;
                    container.appendChild(p);
                }
            }
            createParticles();

            // Connexion
            const form = document.getElementById('loginForm');
            if(form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    const msgDiv = document.getElementById('message');

                    try {
                        const res = await fetch('/api/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            credentials: 'include',
                            body: JSON.stringify({ email, password })
                        });
                        const data = await res.json();
                        if (data.success) {
                            // Ouvrir le profil dans un nouvel onglet
                            window.open('/profile', '_blank');
                            // Revenir à l'accueil dans l'onglet courant
                            window.location.href = '/';
                        } else {
                            msgDiv.innerText = data.error || 'Email ou mot de passe incorrect';
                        }
                    } catch (err) {
                        console.error(err);
                        msgDiv.innerText = 'Erreur de connexion. Vérifiez votre réseau.';
                    }
                });
            }
        })();
    </script>
</body>
</html>
